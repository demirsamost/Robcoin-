<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robcoin Tapper PRO</title>
    <style>
        body { background: #0a0f1e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .game-container { max-width: 500px; width: 100%; }
        .stats { display: flex; justify-content: space-around; background: #151e2c; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #2a3b4e; }
        
        .robux-container { text-align: center; margin: 20px 0; background: transparent; }
        
        /* Видалення ефектів натискання (синє скло) */
        .robux-img { 
            width: 220px; 
            cursor: pointer; 
            transition: 0.1s; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
        }
        .robux-img:active { transform: scale(0.96); }
        
        .section-title { color: #ffcc66; margin: 25px 0 10px; font-weight: bold; text-transform: uppercase; }
        .upgrade-card { background: #1c2838; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a3b4e; }
        
        button { background: #ffcc66; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        button:disabled { background: #444 !important; color: #aaa !important; cursor: not-allowed; }
        .owned-state { background: #444 !important; color: #aaa !important; cursor: default; }
    </style>
</head>
